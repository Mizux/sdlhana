# ref: https://github.com/actions/runner-images
name: amd64 Windows

on: [push, pull_request, workflow_dispatch]

concurrency:
  group: ${{github.workflow}}-${{github.ref}}
  cancel-in-progress: true

# Building using the github runner environement directly.
jobs:
  native:
    strategy:
      matrix:
        cmake: [
          {name: "VS26", generator: "Visual Studio 18 2026", config: Release},
          {name: "VS26", generator: "Visual Studio 18 2026", config: Debug},
        ]
      fail-fast: false
    name: amd64•Windows•CMake(${{matrix.cmake.name}},${{matrix.cmake.config}})
    runs-on: windows-latest
    env:
      deps_key: amd64_windows_deps_${{matrix.cmake.config}}
      CTEST_OUTPUT_ON_FAILURE: 1
    steps:
    - uses: actions/checkout@v7
    - name: Setup SDL3
      uses: libsdl-org/setup-sdl@main
      id: sdl
      with:
        version: 3-latest
        version-sdl-image: 3-latest

      # CONFIGURING CACHES
      - name: Cache CMake dependencies
        uses: actions/cache@v6
        with:
          key: ${{env.deps_key}}-${{hashFiles('CMakeLists.txt', 'cmake/**')}}
          path: |
            ${{github.workspace}}/build/_deps/*-src
            ${{github.workspace}}/build/_deps/*-build
            ${{github.workspace}}/build/_deps/*-subbuild

      - name: Check CMake
        run: |
          cmake --version
          cmake -G || true
      - name: Configure
        run: >
          cmake -S. -Bbuild
          -G "${{matrix.cmake.generator}}"
          -DCMAKE_CONFIGURATION_TYPES=${{matrix.cmake.config}}
          -DCMAKE_INSTALL_PREFIX=install
          -DCMAKE_PREFIX_PATH="${{steps.sdl.outputs.prefix}}"
      - name: Build
        run: >
          cmake --build build
          --config ${{matrix.cmake.config}}
          --target ALL_BUILD
          -v -j2
      - name: Test
        run: >
          cmake --build build
          --config ${{matrix.cmake.config}}
          --target RUN_TESTS
          -v
      - name: Install
        run: >
          cmake --build build
          --config ${{matrix.cmake.config}}
          --target INSTALL
          -v

  amd64_windows_cmake:
    runs-on: ubuntu-latest
    needs: native
    steps:
      - uses: actions/checkout@v7
