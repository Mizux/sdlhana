# ref: https://github.com/actions/runner-images
name: amd64 Windows

on: [push, pull_request, workflow_dispatch]

jobs:
  # Building using the github runner environement directly.
  visual-studio:
    runs-on: windows-latest
    steps:
    - uses: actions/checkout@v7
    - name: Setup SDL3
      uses: libsdl-org/setup-sdl@main
      id: sdl
      with:
        version: 3-latest
        version-sdl-image: 3-latest
    - name: Check cmake
      run: cmake --version
    - name: Configure
      run: >
        cmake -S. -Bbuild -G "Visual Studio 18 2026"
        -DCMAKE_CONFIGURATION_TYPES=Release
        -DCMAKE_INSTALL_PREFIX=install
        -DCMAKE_PREFIX_PATH="${{steps.sdl.outputs.prefix}}"
    - name: Build
      run: cmake --build build --config Release --target ALL_BUILD -v
    - name: Test
      run: cmake --build build --config Release --target RUN_TESTS -v
    - name: Install
      run: cmake --build build --config Release --target INSTALL -v
